<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>病人列表</title>
</head>

<body>

<h1>病人列表</h1>

<table border="1">

<tr>
    <th>病歷號</th>
    <th>姓名</th>
    <th>性別</th>
    <th>電話</th>
    <th>生日</th>
</tr>

<tr th:each="patient : ${patients}">
    <td th:text="${patient.chartNo}"></td>
    <td th:text="${patient.name}"></td>
    <td th:text="${patient.gender}"></td>
    <td th:text="${patient.phone}"></td>
    <td th:text="${patient.birthDate}"></td>
</tr>

</table>

<br>

<a href="/">返回首頁</a>

</body>

</html>
