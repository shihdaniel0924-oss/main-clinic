<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>修改密碼</title>
</head>

<body>

<h2>修改密碼</h2>

<p>
    醫師：
    <span th:text="${loggedInDoctorName}"></span>
</p>

<div th:if="${error}"
     style="color:red;">
    <span th:text="${error}"></span>
</div>

<div th:if="${success}"
     style="color:green;">
    <span th:text="${success}"></span>
</div>

<form th:action="@{/password}"
      method="post">

    <p>
        舊密碼：
        <input type="password"
               name="oldPassword">
    </p>

    <p>
        新密碼：
        <input type="password"
               name="newPassword">
    </p>

    <p>
        確認新密碼：
        <input type="password"
               name="confirmPassword">
    </p>

    <button type="submit">
        修改密碼
    </button>

</form>

<p>
    <a th:href="@{/dashboard}">
        返回儀表板
    </a>
</p>

</body>
</html>
